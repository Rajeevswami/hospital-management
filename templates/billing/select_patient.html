{% extends 'base.html' %}
{% block title %}New Invoice{% endblock %}
{% block content %}
<h4 class="mb-3">Create Invoice - Select Patient</h4>
<div class="card p-4" style="max-width: 500px;">
    <form method="get">
        <div class="mb-3"><label class="form-label">Patient</label>{{ form.patient }}</div>
        <button type="submit" class="btn btn-primary">Continue</button>
    </form>
</div>
{% endblock %}
