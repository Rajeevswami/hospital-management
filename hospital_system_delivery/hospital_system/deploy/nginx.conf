# Nginx reverse proxy config.
# Install: sudo cp deploy/nginx.conf /etc/nginx/sites-available/hospital_system
#          sudo ln -s /etc/nginx/sites-available/hospital_system /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl restart nginx
# Then run certbot (see DEPLOYMENT.md) - it auto-edits this file to add SSL.

server {
    listen 80;
    server_name yourhospital.com www.yourhospital.com;

    client_max_body_size 20M;   # allow patient document/image uploads

    location /static/ {
        alias /var/www/hospital_system/staticfiles/;
    }

    location /media/ {
        alias /var/www/hospital_system/media/;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
